<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cam App LAN</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="hero">
      <div class="badge">LAN ONLY</div>
      <h1>Cam App LAN</h1>
      <p>Viewer simples para conexao direta via WebRTC na LAN.</p>
      <div class="hero-actions">
        <a class="btn ghost" href="publish.html">Usar dispositivo como camera</a>
        <a class="btn ghost" href="admin.html">Configurar servidor</a>
      </div>
    </header>

    <main>
      <section class="controls">
        <div id="httpsWarning" class="notice hidden">
          HTTPS obrigatorio. Abra este viewer via https://SEU_IP_LOCAL:5173.
        </div>
        <label class="field">
          <span>
            Signal Base URL
            <span
              class="help-icon"
              role="button"
              tabindex="0"
              aria-label="Ajuda: URL do servidor de sinalizacao (serve-web.ps1). Configure em admin.html."
              data-tooltip="URL do servidor de sinalizacao (serve-web.ps1). Configure em admin.html."
            >?</span>
          </span>
          <input id="baseUrl" type="text" />
        </label>
        <label class="field">
          <span>
            Media Base URL
            <span
              class="help-icon"
              role="button"
              tabindex="0"
              aria-label="Ajuda: URL do MediaMTX para cameras IP (WHEP). Configure em admin.html."
              data-tooltip="URL do MediaMTX para cameras IP (WHEP). Configure em admin.html."
            >?</span>
          </span>
          <input id="mediaBase" type="text" />
        </label>
        <label class="checkbox">
          <input id="saveServer" type="checkbox" />
          Salvar gravacoes no servidor
        </label>
        <button id="reload" class="btn">Recarregar lista</button>
      </section>

      <section id="grid" class="grid"></section>

      <section class="panel log-panel">
        <div class="log">
          <div class="log-title">Logs</div>
          <pre id="log"></pre>
          <button id="clearLog" class="btn ghost small">Limpar logs</button>
        </div>
      </section>
    </main>

    <template id="camera-card">
      <article class="card">
        <div class="card-head">
          <div class="card-title">
            <div class="dot"></div>
            <span class="name"></span>
          </div>
          <div class="rec-indicator hidden">
            <span class="rec-dot"></span>
            REC
          </div>
          <div class="card-actions">
            <button class="btn connect">Conectar</button>
            <button class="btn ghost disconnect hidden">Desconectar</button>
            <button class="btn ghost fullscreen hidden" type="button">Tela cheia</button>
            <button class="btn ghost audio hidden" type="button">Audio</button>
            <div class="record-menu hidden">
              <button class="btn record" type="button">Gravar</button>
              <div class="record-options hidden">
                <button class="btn ghost record-option" type="button" data-format="mp4">MP4</button>
                <button class="btn ghost record-option" type="button" data-format="webm">WebM</button>
              </div>
            </div>
            <button class="btn ghost stop-record hidden" disabled>Parar</button>
          </div>
        </div>
        <div class="video-wrap">
          <video playsinline autoplay muted></video>
        </div>
        <div class="motion-controls hidden">
          <label class="motion-toggle">
            <input type="checkbox" class="motion-enable" />
            Deteccao de movimento
          </label>
          <label class="motion-field">
            Sensibilidade
            <input type="range" class="motion-sensitivity" min="10" max="100" value="60" />
            <span class="motion-value">60</span>
          </label>
          <label class="motion-field">
            Parar apos
            <input type="range" class="motion-stop" min="3" max="20" value="6" />
            <span class="motion-stop-value">6s</span>
          </label>
        </div>
        <div class="status">Aguardando</div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
